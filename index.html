<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Disease AI Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background-color: #f0f7f4; }
        .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; }
        h2 { color: #2e7d32; }
        input[type="file"] { margin: 20px 0; border: 1px solid #ccc; padding: 10px; width: 90%; }
        button { background-color: #4CAF50; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #45a049; }
        #result { margin-top: 25px; padding: 15px; border-radius: 6px; background-color: #e8f5e9; font-weight: bold; font-size: 18px; color: #1b5e20; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🌿 AI Crop Diagnostics</h2>
    <p>Upload a picture of a leaf to test your Java backend.</p>
    
    <input type="file" id="imageInput" accept="image/*">
    <br>
    <button onclick="uploadImage()">Analyze Leaf</button>

    <div id="result"></div>
</div>

<script>
    async function uploadImage() {
        const fileInput = document.getElementById('imageInput');
        const resultDiv = document.getElementById('result');

        if (fileInput.files.length === 0) {
            alert("Please select an image first!");
            return;
        }

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        resultDiv.style.display = "block";
        resultDiv.innerText = "Analyzing... communicating with Java API.";

        try {
            // This fetch command talks directly to your Spring Boot server!
            const response = await fetch("https://ai-agriculture-api.onrender.com", {
                method: "POST",
                body: formData
            });

            if (response.ok) {
                const text = await response.text();
                resultDiv.innerText = text; // Displays the prediction string from Java
            } else {
                resultDiv.innerText = "API Error: " + response.status;
            }
        } catch (error) {
            resultDiv.innerText = "Error connecting to the server. Is Spring Boot running in IntelliJ?";
            console.error(error);
        }
    }
</script>

</body>
</html>
